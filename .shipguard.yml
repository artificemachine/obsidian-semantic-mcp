# ShipGuard configuration
# See: https://github.com/DevOpsCelstn/shipguard

# Minimum severity to report: critical, high, medium, low
severity_threshold: medium

# Glob patterns for paths to exclude from scanning
exclude_paths:
  - "vendor/**"
  - "node_modules/**"
  - "**/fixtures/**"
  - "**/__snapshots__/**"
  - "osm_init.py"          # setup wizard — no SQL; PY-007 false-positives on bash-launcher f-strings
  - "src/dashboard.py"     # search handlers — vault_clause is a hardcoded literal; PY-007 false-positive. See docs/audits/2026-07-21-production-ready.md §SAST false-positive triage
  - ".claude/**"           # local worktree snapshots — not production code
  - ".ruff_cache/**"       # generated cache files — SC-004 false-positive on a generated .gitignore
  - ".pytest_cache/**"     # generated cache files
  - "**/__pycache__/**"    # generated bytecode
  - ".coverage"            # generated coverage data

# Rule IDs to disable
disable_rules: []
  # - SHELL-008
  # - JS-007

# Additional directories containing custom rule modules
custom_rules_dirs: []

# Optional: use Rust-accelerated secrets scanning (SEC-001/002/003)
# Requires a built `shipguard-secrets` binary in PATH or SHIPGUARD_RUST_SECRETS_BIN.
use_rust_secrets: false

# Per-rule configuration overrides.
# NOTE: `rule_config.<RULE>.skip_paths` is a documented knob but is not honored
# by shipguard 0.5.2 (verified by reading the engine — `rule_config` is parsed
# into Config.rule_config but no rule in rules/*.py consults it). Use
# `exclude_paths` (above) for per-file suppression. Kept here as a no-op
# placeholder for when shipguard implements the per-rule skip_paths.
rule_config: {}
  # PY-007:
  #   skip_paths: ["osm_init.py", "src/dashboard.py"]

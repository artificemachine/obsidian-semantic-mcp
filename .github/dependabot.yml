version: 2
updates:
  # Python dependencies (uv / pyproject.toml + uv.lock)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions — the workflows pin actions by SHA, so this keeps the pins
  # from silently rotting (pinning without an updater is stale-by-design).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"

  # Docker base images — Dockerfile/Dockerfile.dashboard's `uv` COPY --from=
  # and docker-compose.yml's `ollama/ollama` are pinned to a digest for
  # reproducible builds; same stale-by-design risk as the Actions pins above
  # without an updater to bump the digest when a new image is published.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
